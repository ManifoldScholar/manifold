replicaCount: 1

imagePullSecrets:
  - name: github

volumes:
  - name: shared-storage
    persistentVolumeClaim:
      claimName: princeton-manifold-production-shared-pvc

livenessProbe:
  enabled: false
readinessProbe:
  enabled: false

ingress:
  className: "nginx-ingress"
  enabled: true
  hosts:
    - host: openpublishing.princeton.edu
      paths:
        - path: /
          pathType: ImplementationSpecific
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    cert-manager.io/cluster-issuer: "letsencrypt-prod-nginx-ingress"
  tls:
    - hosts:
        - openpublishing.princeton.edu
      secretName: production-princeton-manifold-tls

api:
  rails:
    replicaCount: 2
    host: princeton-manifold-production-api-rails
    resources:
      limits:
        memory: "4Gi"
        cpu: "1000m"
      requests:
        memory: "3Gi"
        cpu: "250m"
  cable:
    resources:
      limits:
        memory: "4Gi"
        cpu: "1000m"
      requests:
        memory: "2Gi"
        cpu: "250m"
    host: princeton-manifold-production-api-cable
  clockwork:
    resources:
      limits:
        memory: "4Gi"
        cpu: "1000m"
      requests:
        memory: "2Gi"
        cpu: "300m"
  sidekiq:
    resources:
      limits:
        memory: "6Gi"
        cpu: "1000m"
      requests:
        memory: "5Gi"
        cpu: "400m"

client:
  resources:
    limits:
      memory: "4Gi"
      cpu: "1000m"
    requests:
      memory: "2Gi"
      cpu: "250m"
  replicaCount: 2
  browserApiCableUrl: https://openpublishing.princeton.edu/cable
  browserApiUrl: https://openpublishing.princeton.edu
  serverApiUrl: http://princeton-manifold-production-api-rails:3020
  serverHost: princeton-manifold-production-client

elasticsearch:
  master:
    resources:
      limits:
        memory: "2Gi"
        cpu: "1000m"
      requests:
        memory: "1Gi"
        cpu: "500m"
  image:
    repository: bitnamilegacy/elasticsearch
    tag: 8.12.2-debian-12-r0
  sysctlImage:
    repository: bitnamilegacy/os-shell

redis:
  master:
    resources:
      limits:
        memory: "512Mi"
        cpu: "250m"
      requests:
        memory: "256Mi"
        cpu: "50m"
  image:
    repository: bitnamilegacy/redis
    tag: 7.2.0-debian-11-r3
  enabled: true
  architecture: standalone
  auth:
    password: $REDIS_PASSWORD # FIXME need to set

env:
  domain: openpublishing.princeton.edu
  elasticsearchUrl: http://princeton-manifold-production-es:9200
  railsDbHost: princeton-manifold-production-postgresql
  railsSecretKey: $SECRET_KEY_BASE
  sentryDsn: $SENTRY_DSN
  sentryEnvironment: $SENTRY_ENVIRONMENT

postgresql:
  enabled: true
  image:
    repository: bitnamilegacy/postgresql
    tag: 14.5.0-debian-11-r35
  auth:
    database: princeton_manifold_production
    password: $DB_PASSWORD
    username: princeton_manifold
  containerPorts:
    postgresql: 5432
  primary:
    resources:
      limits:
        memory: "1Gi"
        cpu: "500m"
      requests:
        memory: "512Mi"
        cpu: "100m"
    service:
      ports:
        postgresql: 5432
  readReplicas:
    service:
      ports:
        postgresql: 5432

nginx:
  enabled: false
  resources:
    limits:
      memory: "512Mi"
      cpu: "100m"
    requests:
      memory: "512Mi"
      cpu: "50m"
  service:
    type: ClusterIP
  image:
    registry: ghcr.io
    repository: notch8/princeton-manifold/nginx
    tag: $TAG
