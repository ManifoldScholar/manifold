autoscaling:
  enabled: true
  minReplicas: 0
  maxReplicas: 2

imagePullSecrets:
  - name: github

volumes:
  - name: shared-storage
    persistentVolumeClaim:
      claimName: princeton-manifold-friends-shared-pvc

livenessProbe:
  enabled: false
readinessProbe:
  enabled: false

ingress:
  enabled: true
  ingressClassName: "nginx-ingress"
  hosts:
    - host: princeton-manifold-friends.notch8.cloud
      paths:
        - path: /
          pathType: ImplementationSpecific
  annotations:
    nginx.org/client-max-body-size: "0"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  tls:
    - hosts:
        - princeton-manifold-friends.notch8.cloud
      secretName: friends-princeton-manifold-tls

api:
  rails:
    host: princeton-manifold-friends-api-rails
    resources:
      limits:
        memory: "4Gi"
        cpu: "1000m"
      requests:
        memory: "2Gi"
        cpu: "100m"
  cable:
    host: princeton-manifold-friends-api-cable
    resources:
      limits:
        memory: "4Gi"
        cpu: "1000m"
      requests:
        memory: "2Gi"
        cpu: "100m"
  clockwork:
    resources:
      limits:
        memory: "4Gi"
        cpu: "1000m"
      requests:
        memory: "2Gi"
        cpu: "300m"
  sidekiq:
    resources:
      limits:
        memory: "16Gi"
        cpu: "1000m"
      requests:
        memory: "2Gi"
        cpu: "800m"

client:
  resources:
    limits:
      memory: "256Mi"
      cpu: "100m"
    requests:
      memory: "256Mi"
      cpu: "20m"
  browserApiCableUrl: https://princeton-manifold-friends.notch8.cloud/cable
  browserApiUrl: https://princeton-manifold-friends.notch8.cloud
  serverApiUrl: http://princeton-manifold-friends-api-rails:3020
  serverHost: princeton-manifold-friends-client

elasticsearch:
  master:
    resources:
      limits:
        memory: "2Gi"
        cpu: "1000m"
      requests:
        memory: "1Gi"
        cpu: "250m"
  image:
    repository: bitnamilegacy/elasticsearch
    tag: 8.12.2-debian-12-r0
  sysctlImage:
    repository: bitnamilegacy/os-shell

redis:
  master:
    resources:
      limits:
        memory: "512Mi"
        cpu: "100m"
      requests:
        memory: "256Mi"
        cpu: "20m"
  image:
    repository: bitnamilegacy/redis
    tag: 7.2.0-debian-11-r3
  enabled: true
  architecture: standalone
  auth:
    password: $REDIS_PASSWORD # FIXME need to set

env:
  domain: princeton-manifold-friends.notch8.cloud
  elasticsearchUrl: http://princeton-manifold-friends-es:9200
  railsDbHost: princeton-manifold-friends-postgresql
  railsSecretKey: $SECRET_KEY_BASE
  sentryDsn: $SENTRY_DSN
  sentryEnvironment: $SENTRY_ENVIRONMENT

postgresql:
  enabled: true
  image:
    repository: bitnamilegacy/postgresql
    tag: 14.5.0-debian-11-r35
  auth:
    database: princeton_manifold_friends
    password: $DB_PASSWORD
    username: princeton_manifold
  containerPorts:
    postgresql: 5432
  primary:
    resources:
      limits:
        memory: "1Gi"
        cpu: "500m"
      requests:
        memory: "512Mi"
        cpu: "50m"
    service:
      ports:
        postgresql: 5432
  readReplicas:
    service:
      ports:
        postgresql: 5432

nginx:
  enabled: false
  resources:
    limits:
      memory: "256Mi"
      cpu: "100m"
    requests:
      memory: "128Mi"
      cpu: "20m"
  service:
    type: ClusterIP
  image:
    registry: ghcr.io
    repository: notch8/princeton-manifold/nginx
    tag: $TAG
