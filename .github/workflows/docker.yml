name: "Build & Push Docker"

on:
  push:
    branches:
      - next # Next, tags as "next"
      - main # Edge, tags as "edge"
      - release # Production, tags as "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository }}
  MANAGED_REGISTRY: registry.digitalocean.com
  MANAGED_IMAGE_NAME: manifold/manifold

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login DOCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.MANAGED_REGISTRY }}
          username: docr
          password: ${{ secrets.DOCR_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}-api
            ${{ env.MANAGED_REGISTRY }}/${{ env.MANAGED_IMAGE_NAME }}-api
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'release' }}
            type=raw,value=edge,enable={{ is_default_branch }}
            type=ref,event=branch
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Docker
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./api
          target: production
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args:
            "RAILS_ENV=production"

  build-client:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login DOCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.MANAGED_REGISTRY }}
          username: docr
          password: ${{ secrets.DOCR_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}-client
            ${{ env.MANAGED_REGISTRY }}/${{ env.MANAGED_IMAGE_NAME }}-client
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'release' }}
            type=raw,value=edge,enable={{ is_default_branch }}
            type=ref,event=branch
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Docker
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./client
          target: production
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args:
            "RAILS_ENV=production"